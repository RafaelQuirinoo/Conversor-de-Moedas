<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor Simples</title>
</head>
<body>

    <h2>Conversor de Moedas</h2>

    <input type="number" id="valor" placeholder="Valor">

    <select id="moeda">
        <option value="usd_brl">Dólar para Real</option>
        <option value="brl_usd">Real para Dólar</option>
        <option value="eur_brl">Euro para Real</option>
        <option value="brl_eur">Real para Euro</option>
    </select>

    <p>Resultado: <b id="saida">0.00</b></p>

    <script src="app.js"></script>
    
</body>
</html>
